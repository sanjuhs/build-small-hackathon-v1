<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tiny Toybox Model Lab</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    :root {
      color-scheme: light;
      --ink: #182222;
      --muted: #64706c;
      --paper: #fffaf0;
      --line: rgba(24, 34, 34, 0.16);
      --teal: #123238;
      --amber: #ffcc4f;
      --coral: #ff704d;
      --aqua: #70cfe0;
      --shadow: 0 18px 54px rgba(18, 50, 56, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f2ea;
    }

    button,
    a {
      font: inherit;
    }

    #lab {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.94), rgba(234, 247, 247, 0.78)),
        radial-gradient(circle at 24% 18%, rgba(255, 204, 79, 0.2), transparent 30%);
    }

    #modelStage {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .topbar,
    .pet-rail,
    .detail-panel,
    .viewbar {
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.8);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .topbar {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 4;
      min-height: 48px;
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      pointer-events: none;
    }

    .brand {
      min-width: 0;
      font-size: 13px;
      font-weight: 820;
      white-space: nowrap;
    }

    .links {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: flex-end;
      pointer-events: auto;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-width: 40px;
      height: 34px;
      border: 1px solid rgba(24, 34, 34, 0.12);
      border-radius: 7px;
      padding: 0 11px;
      color: var(--ink);
      background: #ffffff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 760;
      }

    .home-link svg,
    .pet-button svg,
    .view-button svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.2;
      flex: none;
    }

    .pet-rail {
      position: absolute;
      left: 16px;
      top: 82px;
      z-index: 4;
      width: 188px;
      border-radius: 8px;
      padding: 7px;
      display: grid;
      gap: 6px;
      pointer-events: auto;
    }

    .pet-button,
    .view-button {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      width: 100%;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 0 10px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 760;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .pet-button:hover,
    .view-button:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.66);
      border-color: rgba(24, 34, 34, 0.12);
    }

    .pet-button.active,
    .view-button.active {
      background: #ffffff;
      border-color: rgba(24, 34, 34, 0.16);
      box-shadow: 0 6px 16px rgba(18, 50, 56, 0.1);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border: 1px solid rgba(24, 34, 34, 0.14);
      border-radius: 999px;
      flex: none;
    }

    .detail-panel {
      position: absolute;
      right: 16px;
      top: 82px;
      z-index: 4;
      width: min(330px, calc(100vw - 32px));
      border-radius: 8px;
      padding: 15px;
      pointer-events: none;
    }

    .detail-kicker {
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-title {
      margin-top: 5px;
      font-size: 28px;
      font-weight: 870;
      line-height: 1.02;
    }

    .detail-copy {
      margin-top: 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 620;
      line-height: 1.45;
    }

    .detail-list {
      display: grid;
      gap: 7px;
      margin-top: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 10px;
      align-items: start;
      min-height: 24px;
      font-size: 12px;
      line-height: 1.35;
    }

    .detail-row strong {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .power-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .power-chip {
      border-radius: 999px;
      padding: 5px 8px;
      color: var(--teal);
      background: rgba(112, 207, 224, 0.24);
      font-size: 11px;
      font-weight: 780;
      line-height: 1;
      white-space: nowrap;
    }

    .viewbar {
      position: absolute;
      left: 50%;
      bottom: 16px;
      z-index: 4;
      transform: translateX(-50%);
      width: min(430px, calc(100vw - 32px));
      border-radius: 8px;
      padding: 7px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      pointer-events: auto;
    }

    .view-button {
      justify-content: center;
      height: 38px;
      padding: 0 8px;
    }

    @media (max-width: 840px) {
      .topbar {
        left: 12px;
        right: 12px;
      }

      .links {
        gap: 6px;
      }

      .pet-rail {
        left: 12px;
        right: 12px;
        top: 76px;
        width: auto;
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .pet-button {
        justify-content: center;
        padding: 0;
      }

      .pet-button span:last-child {
        display: none;
      }

      .detail-panel {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 72px;
        width: auto;
        padding: 12px;
      }

      .detail-title {
        font-size: 21px;
      }

      .detail-copy {
        display: none;
      }

      .detail-row {
        grid-template-columns: 66px 1fr;
      }

      .viewbar {
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <main id="lab">
    <canvas id="modelStage"></canvas>

    <div class="topbar">
      <div class="brand">Tiny Toybox Model Lab</div>
      <div class="links">
        <a class="home-link" href="/pages" title="All pages"><span>Pages</span></a>
        <a class="home-link" href="/blender-models" title="Blender rigs"><span>Blender Rigs</span></a>
        <a class="home-link" href="/toy" title="Toy room"><i data-lucide="sparkles"></i><span>Toy Room</span></a>
      </div>
    </div>

    <nav class="pet-rail" aria-label="Characters">
      <button class="pet-button active" data-pet="squeaky"><i data-lucide="clock-3"></i><span class="swatch"></span><span>Squeaky</span></button>
      <button class="pet-button" data-pet="electraica"><i data-lucide="zap"></i><span class="swatch"></span><span>Electraica</span></button>
      <button class="pet-button" data-pet="fire_boy"><i data-lucide="flame"></i><span class="swatch"></span><span>Fire Boy</span></button>
      <button class="pet-button" data-pet="shark_girl"><i data-lucide="waves"></i><span class="swatch"></span><span>Shark Girl</span></button>
    </nav>

    <section class="detail-panel" aria-live="polite">
      <div class="detail-kicker" id="detailKind">Character model</div>
      <div class="detail-title" id="detailTitle">Squeaky</div>
      <div class="detail-copy" id="detailCopy"></div>
      <div class="detail-list">
        <div class="detail-row"><strong>Body</strong><span id="detailBody"></span></div>
        <div class="detail-row"><strong>Gear</strong><span id="detailGear"></span></div>
        <div class="detail-row"><strong>Powers</strong><span class="power-chips" id="detailPowers"></span></div>
      </div>
    </section>

    <div class="viewbar" aria-label="Views">
      <button class="view-button active" data-view="front">Front</button>
      <button class="view-button" data-view="side">Side</button>
      <button class="view-button" data-view="back">Back</button>
      <button class="view-button" data-view="reset"><i data-lucide="rotate-ccw"></i></button>
    </div>
  </main>

  <script type="module" src="/frontend/toybox/model_gallery.js"></script>
</body>
</html>
